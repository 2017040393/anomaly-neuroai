seed: 42
device: cuda
experiment_name: cloud_train_mlp
output_dir: results/runs

data:
  num_features: 16
  num_classes: 3
  train_size: 20000
  val_size: 4000

model:
  name: mlp
  hidden_dim: 128
  time_steps: 8

train:
  batch_size: 256
  epochs: 40
  lr: 0.0005
  num_workers: 4
  use_amp: true

save:
  checkpoint_dir: checkpoints/cloud
  save_best: true
