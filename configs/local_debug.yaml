seed: 42
device: cuda
experiment_name: local_debug_mlp
output_dir: results/runs

data:
  num_features: 16
  num_classes: 3
  train_size: 128
  val_size: 64

model:
  name: mlp
  hidden_dim: 32
  time_steps: 4

train:
  batch_size: 16
  epochs: 3
  lr: 0.001
  num_workers: 0
  use_amp: false

save:
  checkpoint_dir: checkpoints/local
  save_best: true
